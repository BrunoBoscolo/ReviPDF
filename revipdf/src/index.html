<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ReviPDF - Revision Tool</title>
    <!-- We must use locally compiled Tailwind CSS per memory constraints -->
    <link href="output.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Highlight dropzone when dragged over */
        .drop-active {
            border-color: rgba(72, 0, 173, 0.8) !important;
            background-color: rgba(72, 0, 173, 0.05) !important;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<!-- Global Loader Overlay -->
<div id="global-loader" class="fixed inset-0 z-[9999] bg-white dark:bg-slate-950 flex flex-col items-center justify-center transition-opacity duration-500">
    <button onclick="window.history.back()" class="absolute top-8 left-8 p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 transition-colors z-[10000]">
        <span class="material-symbols-outlined text-3xl">arrow_back</span>
    </button>
    <div class="text-4xl font-black tracking-tighter bg-gradient-to-r from-primary via-tertiary to-primary bg-clip-text text-transparent animate-gradient-x">
        ReviPDF
    </div>
</div>

<div class="flex min-h-screen">
<!-- Sidebar -->
<aside class="w-64 bg-white dark:bg-slate-950 border-r border-slate-200 dark:border-slate-800 flex flex-col h-screen sticky top-0">
<div class="p-6 flex items-center gap-3">
<div class="size-10 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined">description</span>
</div>
<div>
<h1 class="text-slate-900 dark:text-white font-bold text-lg leading-none">ReviPDF</h1>
<p class="text-slate-500 dark:text-slate-400 text-xs">Revision Tool</p>
</div>
</div>
<nav class="flex-1 px-4 space-y-1 mt-4">
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/10 text-primary font-medium transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-sm">Home</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors" href="#">
<span class="material-symbols-outlined">folder_open</span>
<span class="text-sm">Files</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-sm">Settings</span>
</a>
</nav>
</aside>
<!-- Main Content -->
<main class="flex-1 flex flex-col min-w-0">
<!-- Header -->
<header class="h-16 bg-white dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 sticky top-0 z-10">
<div class="flex items-center gap-4 flex-1 max-w-xl">
<div class="relative w-full">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
<input class="w-full bg-slate-100 dark:bg-slate-900 border-none rounded-lg py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/20 placeholder:text-slate-500" placeholder="Search documents..." type="text"/>
</div>
</div>
<div class="flex items-center gap-3 ml-4">
<button class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-lg">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-lg">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<!-- Dashboard Content -->
<div class="p-8 max-w-7xl mx-auto w-full">
<!-- Upload Area -->
<div class="mb-10">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-6">Dashboard</h2>
<div id="dropzone" class="bg-white dark:bg-slate-900 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl p-8 flex flex-col items-center justify-center text-center transition-all hover:border-primary/40 group cursor-pointer">
<div class="size-16 bg-primary/10 rounded-full flex items-center justify-center text-primary mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">cloud_upload</span>
</div>
<h3 class="text-lg font-semibold text-slate-900 dark:text-white">Upload New PDF</h3>
<p class="text-slate-500 dark:text-slate-400 mt-1 mb-6 max-w-sm">Drag and drop your PDF files here, or click to browse from your computer.</p>
<button id="browseBtn" class="bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-lg font-medium transition-colors flex items-center gap-2 relative z-10">
<span class="material-symbols-outlined text-lg">add</span>
                            Browse Files
                        </button>
</div>
<div id="statusMessage" class="mt-4 text-sm font-medium text-primary hidden"></div>
</div>
</div>
</main>
</div>

<script type="module">
  const { listen } = window.__TAURI__.event;
  const { Command } = window.__TAURI__.shell;
  const { open } = window.__TAURI__.dialog;
  const { join, tempDir } = window.__TAURI__.path;
  const { readTextFile, BaseDirectory } = window.__TAURI__.fs;

  document.addEventListener('DOMContentLoaded', () => {
    const statusMessage = document.createElement('div');
    statusMessage.id = 'statusMessage';

    const dropzone = document.querySelector('.group'); // Find the upload area
    if (dropzone) {
      dropzone.id = 'dropzone';
      dropzone.appendChild(statusMessage);
    }

    function showStatus(msg, isError = false) {
      if (!statusMessage) return;
      statusMessage.textContent = msg;
      statusMessage.className = `mt-4 text-sm font-medium ${isError ? 'text-red-500' : 'text-primary'} block`;
    }

    async function processPdf(filePath) {
      if (!filePath.toLowerCase().endsWith('.pdf')) {
        showStatus('Please select a valid PDF file.', true);
        return;
      }

      showStatus('Starting processing...');
      try {
        const systemTempDir = await tempDir();
        const hashFileName = `pdf_hash_${Date.now()}.txt`;
        const hashFilePath = await join(systemTempDir, hashFileName);

        const command = Command.sidecar("binaries/pdf_processor", ["aulas", filePath, "--hash-output", hashFilePath]);

        let capturedHash = null;
        console.log("Executing sidecar command...");
        console.log("Saving hash to:", hashFilePath);

        const output = await command.execute();

        console.log("Sidecar output:", output);
        console.log("Sidecar stdout:", output.stdout);
        console.log("Sidecar stderr:", output.stderr);
        console.log("Sidecar exit code:", output.code);

        try {
          const hashFileContent = await readTextFile(hashFileName, { baseDir: BaseDirectory.Temp });
          if (hashFileContent && hashFileContent.trim()) {
            capturedHash = hashFileContent.trim();
            console.log("Captured pdfHash from file:", capturedHash);
          }
        } catch (e) {
          console.error("Failed to read hash output file at:", hashFileName, e);
        }

        if (!capturedHash) {
          const parts = output.stdout.split('\n');
          console.log(`Split stdout into ${parts.length} parts for fallback`);

          for (const part of parts) {
            const trimmed = part.trim();
            if (!trimmed) continue;

            try {
              console.log("Attempting to parse:", trimmed);
              const parsed = JSON.parse(trimmed);
              console.log("Parsed JSON:", parsed);
              if (parsed && parsed.pdf_hash) {
                console.log("Captured pdfHash from stdout:", parsed.pdf_hash);
                capturedHash = parsed.pdf_hash;
              }
            } catch (e) {
              console.log("Failed to parse part as JSON:", trimmed);
            }
          }
        }

        if (output.code === 0 && capturedHash) {
          console.log("Setting localStorage and redirecting...");
          try {
            localStorage.setItem('currentPdfHash', capturedHash);
            localStorage.setItem('currentPdfPath', filePath);
            console.log("localStorage updated successfully");
          } catch (storageError) {
            console.error("Failed to set localStorage:", storageError);
            // In case localStorage is entirely blocked due to tracking prevention
            // We can fall back to passing the hash as a URL parameter
            console.warn("Falling back to URL parameters due to localStorage error.");
            showStatus('Processing complete! Redirecting...');
            setTimeout(() => {
              window.location.href = `review.html?hash=${capturedHash}&path=${encodeURIComponent(filePath)}`;
            }, 1000);
            return;
          }

          showStatus('Processing complete! Redirecting...');
          setTimeout(() => {
            window.location.href = 'review.html';
          }, 1000);
        } else if (output.code === 0 && !capturedHash) {
          showStatus('Processing complete, but could not capture the file hash from stdout.', true);
          console.error("Missing pdf_hash in stdout despite successful exit code.");
        } else {
          showStatus(`Processing failed. Code: ${output.code}`, true);
        }
      } catch (e) {
        showStatus(`Failed to execute sidecar: ${e}`, true);
        console.error(e);
      }
    }

    // File browse button logic
    const browseBtn = document.getElementById('browseBtn');
    if (browseBtn) {
      browseBtn.addEventListener('click', async (e) => {
        // Prevent event from bubbling up to dropzone if it's nested
        e.stopPropagation();

        try {
          const selected = await open({
            multiple: false,
            filters: [{
              name: 'PDF',
              extensions: ['pdf']
            }]
          });

          if (selected) {
            processPdf(selected);
          }
        } catch (err) {
          showStatus(`Failed to open dialog: ${err}`, true);
        }
      });
    }

    // Tauri drag and drop events
    listen('tauri://drag-enter', (e) => {
      dropzone.classList.add('drop-active');
    });

    listen('tauri://drag-leave', (e) => {
      dropzone.classList.remove('drop-active');
    });

    listen('tauri://drag-drop', (e) => {
      dropzone.classList.remove('drop-active');
      const payload = e.payload;
      if (payload && payload.paths && payload.paths.length > 0) {
        processPdf(payload.paths[0]);
      }
    });
  });

  // Loader Logic
  window.addEventListener('load', () => {
    const loader = document.getElementById('global-loader');
    const aside = document.querySelector('aside');
    if (loader) {
      loader.classList.add('opacity-0');
      if (aside) aside.style.opacity = '1';
      setTimeout(() => {
        loader.style.display = 'none';
      }, 500);
    }
  });

  const showErrorToast = (msg) => {
    let toast = document.getElementById('error-toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'error-toast';
      toast.className = 'fixed bottom-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-2xl z-[10000] font-bold text-sm transition-all duration-300 opacity-0 translate-y-4';
      document.body.appendChild(toast);
    }
    toast.innerHTML = `<span class="material-symbols-outlined align-middle mr-2 text-lg">error</span>${msg}`;

    // Show toast
    setTimeout(() => {
      toast.classList.remove('opacity-0', 'translate-y-4');
    }, 10);

    // Hide toast after 3s
    setTimeout(() => {
      toast.classList.add('opacity-0', 'translate-y-4');
    }, 3000);
  };

  document.addEventListener('click', async (e) => {
    const link = e.target.closest('a');
    if (link && link.href && !link.href.startsWith('javascript:') && !link.href.startsWith('#') && link.target !== '_blank') {
      const loader = document.getElementById('global-loader');
      const aside = document.querySelector('aside');

      if (loader) {
        e.preventDefault();
        loader.style.display = 'flex';
        if (aside) aside.style.opacity = '0'; // Hide sidebar

        // Give a tiny delay for browser to render display:flex before animating opacity
        setTimeout(async () => {
          loader.classList.remove('opacity-0');

          try {
            // Verify if the destination exists
            const response = await fetch(link.href, { method: 'HEAD' });
            if (response.ok || response.status === 0) {
              setTimeout(() => {
                window.location.href = link.href;
              }, 300); // Wait for fade in
            } else {
              throw new Error('Page not found');
            }
          } catch (err) {
            // Redirect failed
            setTimeout(() => {
              loader.classList.add('opacity-0');
              if (aside) aside.style.opacity = '1';
              setTimeout(() => {
                loader.style.display = 'none';
                showErrorToast("Could not load the page. It might not exist.");
              }, 500);
            }, 300);
          }
        }, 10);
      }
    }
  });

  // Intercept the redirect in processPdf to show loader
  const originalHref = Object.getOwnPropertyDescriptor(window.location, 'href');
  if (!originalHref) {
    // If we can't hook location, we can at least observe the statusMessage text for completion
    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        if (mutation.target.id === 'statusMessage' && mutation.target.textContent.includes('Redirecting')) {
          const loader = document.getElementById('global-loader');
          const aside = document.querySelector('aside');
          if (loader) {
            loader.style.display = 'flex';
            if (aside) aside.style.opacity = '0';
            setTimeout(() => loader.classList.remove('opacity-0'), 10);
          }
        }
      });
    });
    const statusMsg = document.getElementById('statusMessage');
    if (statusMsg) observer.observe(statusMsg, { childList: true, characterData: true, subtree: true });
  }
</script>
</body>
</html>
